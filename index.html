<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usaha Kopi</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      margin: 0;
      padding: 0;
    }

    header {
      background-color: #6f4e37;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }

    .menu {
      background: white;
      width: 220px;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      text-align: center;
    }

    .menu h2 {
      color: #6f4e37;
    }

    .harga {
      color: green;
      font-weight: bold;
      margin: 10px 0;
    }

    button {
      background-color: #6f4e37;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #4b2e1f;
    }
  </style>
</head>
<body>

  <header>
    <h1>☕ Kedai Kopi Nusantara</h1>
    <p>Menu kopi favorit pelanggan</p>
  </header>

  <div class="container">

    <div class="menu">
      <h2>Espresso</h2>
      <p>Kopi hitam pekat</p>
      <p class="harga">Rp15.000</p>
      <button>Beli</button>
    </div>

    <div class="menu">
      <h2>Cappuccino</h2>
      <p>Kopi susu creamy</p>
      <p class="harga">Rp20.000</p>
      <button>Beli</button>
    </div>

    <div class="menu">
      <h2>Latte</h2>
      <p>Perpaduan kopi dan susu</p>
      <p class="harga">Rp22.000</p>
      <button>Beli</button>
    </div>

    <div class="menu">
      <h2>Americano</h2>
      <p>Espresso dengan air panas</p>
      <p class="harga">Rp18.000</p>
      <button>Beli</button>
    </div>

    <div class="menu">
      <h2>Mocha</h2>
      <p>Kopi dengan coklat manis</p>
      <p class="harga">Rp25.000</p>
      <button>Beli</button>
    </div>

  </div>

</body>
</html>
